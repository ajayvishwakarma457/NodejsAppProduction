name: Continuous Integration Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test & Validate
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Test Suite
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/test_db
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret
          SESSION_SECRET: test_session_secret
        run: npm test

      - name: Verify Monolith Docker Image Build
        run: docker build -t nodejs-monolith-app:test .

      - name: Verify API Gateway Docker Image Build
        run: docker build -f microservices/api-gateway/Dockerfile -t nodejs-api-gateway:test .

      - name: Verify User Service Docker Image Build
        run: docker build -f microservices/user-service/Dockerfile -t nodejs-user-service:test .

      - name: Verify Notification Service Docker Image Build
        run: docker build -f microservices/notification-service/Dockerfile -t nodejs-notification-service:test .

      - name: Validate Kubernetes Manifests
        run: |
          kubectl apply --dry-run=client --validate=false -f kubernetes/
