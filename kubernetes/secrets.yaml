apiVersion: v1
kind: Secret
metadata:
  name: nodejs-app-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: nodejs-app
type: Opaque
stringData:
  MONGODB_URI: "mongodb://root:supersecretpassword@mongodb-service:27017/production_roadmap?authSource=admin"
  DB_PASS: "supersecretpassword"
  JWT_SECRET: "super_secret_key_for_signing_access_tokens"
  JWT_REFRESH_SECRET: "another_super_secret_key_for_refresh_tokens"
  SESSION_SECRET: "super_secret_session_key_for_signing_cookies"
  GOOGLE_CLIENT_ID: "mock-client-id.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "mock-client-secret"
  GOOGLE_CALLBACK_URL: "http://localhost:5000/api/v1/auth/google/callback"
  CLIENT_REDIRECT_URL: "http://localhost:3000/auth-success"
  AWS_ACCESS_KEY_ID: "mock-access-key-id"
  AWS_SECRET_ACCESS_KEY: "mock-secret-access-key"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "production-roadmap-bucket"
