apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nodejs-monolith-ab-test-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-cookie: "user_tier" # Routes based on cookie value (always sends to canary if cookie value is 'always')
spec:
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nodejs-monolith-canary-service # Routes matching cookie requests here
                port:
                  number: 5000
