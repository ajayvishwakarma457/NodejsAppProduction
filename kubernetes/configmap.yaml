apiVersion: v1
kind: ConfigMap
metadata:
  name: nodejs-app-config
  namespace: default
  labels:
    app.kubernetes.io/name: nodejs-app
data:
  NODE_ENV: "production"
  APP_NAME: "nodejs-production-platform"
  CORS_ORIGIN: "http://localhost:3000,http://localhost:4000"
  LOKI_HOST: "http://loki.monitoring.svc.cluster.local:3100"
  SYNTHETIC_PROBER_ENABLED: "false"
  SYNTHETIC_PROBE_INTERVAL_MS: "30000"
  SYNTHETIC_PROBE_TARGETS: "http://nodejs-monolith-service:5000/health"
  DB_HOST: "mongodb-service"
  DB_USER: "root"
