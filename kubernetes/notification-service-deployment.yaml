apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-notification-service
  namespace: default
  labels:
    app: nodejs-notification-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: nodejs-notification-service
  template:
    metadata:
      labels:
        app: nodejs-notification-service
    spec:
      containers:
        - name: notification-service
          image: nodejs-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6002
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: nodejs-app-config
            - secretRef:
                name: nodejs-app-secrets
          env:
            - name: PORT
              value: "6002"
          livenessProbe:
            httpGet:
              path: /health
              port: 6002
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 6002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nodejs-notification-service
  namespace: default
  labels:
    app: nodejs-notification-service
spec:
  type: ClusterIP
  ports:
    - port: 6002
      targetPort: 6002
      protocol: TCP
      name: http
  selector:
    app: nodejs-notification-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nodejs-notification-service-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nodejs-notification-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
